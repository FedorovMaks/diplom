<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Вход администратора</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <span class="brand">
        <span class="brand-icon">&#127891;</span>
        Опросы колледжа
      </span>
      <div class="topbar-nav">
        <a href="/">На главную</a>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav>
        <ul class="sidebar-nav">
          <li><a href="/"><span class="nav-icon">&#127968;</span> Главная</a></li>
          <div class="sidebar-section">Студенты</div>
          <li><a href="/survey-general.html"><span class="nav-icon">&#128221;</span> Общий опрос</a></li>
          <li><a href="/survey-pps.html"><span class="nav-icon">&#11088;</span> Оценка ППС</a></li>
          <div class="sidebar-section">Преподаватели</div>
          <li><a href="/survey-teacher.html"><span class="nav-icon">&#128218;</span> Опрос преподавателей</a></li>
        </ul>
      </nav>
    </aside>

    <div class="main-content">
      <main class="container container--narrow">
        <div class="breadcrumb">
          <a href="/">Главная</a>
          <span class="sep">/</span>
          <span>Вход администратора</span>
        </div>

        <h1>Вход администратора</h1>
        <p class="subtitle">Введите учётные данные.</p>
        <form id="loginForm" class="card">
          <label for="login">Логин</label>
          <input id="login" name="login" type="text" autocomplete="username" required>
          <label for="password">Пароль</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
          <div id="alertBox"></div>
          <div class="btn-row">
            <button type="submit" class="btn">Войти</button>
          </div>
        </form>
      </main>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const alertBox = document.getElementById('alertBox');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.innerHTML = '';
      const fd = new FormData(form);
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login: fd.get('login'), password: fd.get('password') }),
      });
      if (res.ok) {
        window.location.href = '/admin.html';
      } else {
        const data = await res.json().catch(() => ({}));
        alertBox.innerHTML = `<div class="alert alert-error">${data.error || 'Ошибка входа'}</div>`;
      }
    });
  </script>
</body>
</html>
